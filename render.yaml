# Render Blueprint: https://render.com/docs/blueprint-spec
# In the Render dashboard: New -> Blueprint -> point it at your repo, and
# this file sets up the web service + database together automatically.
# (You can also skip this entirely and configure both manually in the
# dashboard instead -- see README for those steps.)

services:
  - type: web
    name: versushub
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn versushub.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: versushub-db
          property: connectionString

databases:
  - name: versushub-db
    plan: free
